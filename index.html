<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weakness Quiz</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css?v=20260430-critic-record-fixes">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar" aria-label="学習設定">
      <div class="brand">
        <p class="label">中3 苦手克服</p>
        <h1>Weakness Quiz</h1>
        <p class="brand-subtitle">数学を軸に、理科・社会の取りこぼしを短時間で戻す。</p>
      </div>

      <section class="panel">
        <div class="panel-heading">
          <h2>モード</h2>
        </div>
        <div class="segmented" role="group" aria-label="クイズモード">
          <button class="mode-button active" data-mode="daily" type="button">今日の20問</button>
          <button class="mode-button" data-mode="focus" type="button">苦手集中</button>
          <button class="mode-button" data-mode="review" type="button">できなかった問題</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>教科</h2>
        </div>
        <div class="subject-list" id="subjectList"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>カテゴリ</h2>
        </div>
        <div class="category-list" id="categoryList"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>記録</h2>
        </div>
        <dl class="stats">
          <div><dt>累計解答</dt><dd id="answeredCount">0</dd></div>
          <div><dt>累計正答率</dt><dd id="accuracyRate">0%</dd></div>
          <div><dt>学習日数</dt><dd id="studyDaysCount">0</dd></div>
          <div><dt>連続日数</dt><dd id="streakCount">0</dd></div>
          <div><dt>復習待ち</dt><dd id="reviewCount">0</dd></div>
        </dl>
      </section>

      <section class="panel compact">
        <div class="panel-heading">
          <h2>問題バンク</h2>
        </div>
        <dl class="stats">
          <div><dt>登録問題</dt><dd id="bankCount">0</dd></div>
          <div><dt>S/A問題</dt><dd id="priorityCount">0</dd></div>
        </dl>
        <div class="record-actions">
          <button class="ghost-button" id="exportProgress" type="button">記録を書き出す</button>
          <button class="ghost-button" id="importProgress" type="button">記録を読み込む</button>
          <input class="hidden" id="importProgressFile" type="file" accept="application/json,.json">
        </div>
        <button class="ghost-button" id="resetProgress" type="button">記録をリセット</button>
      </section>
    </aside>

    <section class="quiz-area" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="label" id="quizLabel">数学中心</p>
          <h2 id="quizTitle">方程式・図形・理科社会の基礎</h2>
        </div>
        <button class="primary-button" id="newQuiz" type="button">出題を更新</button>
      </header>

      <section class="dashboard" aria-label="学習状況">
        <div class="metric">
          <span class="metric-label">今日の進み</span>
          <strong id="progressMetric">0/20</strong>
        </div>
        <div class="metric">
          <span class="metric-label">今回の正答</span>
          <strong id="scoreMetric">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">今日の解答</span>
          <strong id="todayAnsweredMetric">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">今日の正答率</span>
          <strong id="todayAccuracyMetric">0%</strong>
        </div>
        <div class="metric">
          <span class="metric-label">連続日数</span>
          <strong id="streakMetric">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">復習待ち</span>
          <strong id="reviewMetric">0</strong>
        </div>
      </section>

      <div class="progress-wrap">
        <div class="progress-info">
          <span id="progressText">1 / 20</span>
          <span id="scoreText">0 正解</span>
        </div>
        <div class="progress-bar" aria-hidden="true"><span id="progressBar"></span></div>
      </div>

      <div class="workspace">
        <article class="question-card" id="questionCard">
          <div class="meta-row">
            <span class="pill" id="subjectPill">数学</span>
            <span class="pill muted" id="unitPill">方程式</span>
            <span class="pill priority" id="priorityPill">S</span>
            <span class="pill muted" id="questionStage">基礎</span>
          </div>
          <p class="prompt" id="prompt"></p>
          <div class="choices" id="choices"></div>
          <section class="explanation hidden" id="explanation">
            <h3>解説</h3>
            <p id="explanationText"></p>
            <div class="mistake-box">
              <label for="mistakeType">ミスの種類</label>
              <select id="mistakeType">
                <option value="">選択しない</option>
                <option value="計算ミス">計算ミス</option>
                <option value="符号ミス">符号ミス</option>
                <option value="移項ミス">移項ミス</option>
                <option value="割り算ミス">割り算ミス</option>
                <option value="平方根ミス">平方根ミス</option>
                <option value="分数処理ミス">分数処理ミス</option>
                <option value="立式ミス">立式ミス</option>
                <option value="知識不足">知識不足</option>
                <option value="問題文の読み違い">問題文の読み違い</option>
                <option value="途中式不足">途中式不足</option>
              </select>
            </div>
          </section>
        </article>

        <aside class="unit-panel" aria-label="単元別の状態">
          <div class="panel-heading">
            <h2>バッジ</h2>
          </div>
          <div id="badgeList" class="badge-list"></div>

          <div class="panel-heading unit-heading">
            <h2>単元</h2>
          </div>
          <div id="unitTrack" class="unit-track"></div>
        </aside>
      </div>

      <nav class="actions" aria-label="問題操作">
        <button class="ghost-button" id="prevQuestion" type="button">前へ</button>
        <button class="primary-button" id="nextQuestion" type="button">次へ</button>
      </nav>

      <section class="summary hidden" id="summary">
        <h2>結果</h2>
        <p id="summaryText"></p>
        <div id="weakUnitList" class="weak-list"></div>
      </section>
    </section>
  </main>

  <script src="data/questions.js?v=20260430-critic-record-fixes"></script>
  <script src="app.js?v=20260430-critic-record-fixes"></script>
</body>
</html>
